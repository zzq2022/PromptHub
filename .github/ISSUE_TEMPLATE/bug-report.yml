name: "Bug Report"
description: "Report a reproducible bug in PromptHub."
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        Please fill out the sections below so we can reproduce and triage it quickly.

  - type: dropdown
    id: area
    attributes:
      label: "Area"
      description: "Which part of PromptHub is affected?"
      options:
        - "Desktop app"
        - "Self-hosted web"
        - "CLI"
        - "Sync / backup / restore"
        - "Skill Store / Skills"
        - "Settings / updates"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: "Platform"
      description: "Where did you hit the problem?"
      options:
        - "macOS Apple Silicon"
        - "macOS Intel"
        - "Windows x64"
        - "Windows ARM64"
        - "Linux"
        - "Browser / self-hosted web"
        - "Multiple platforms"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "Version"
      description: "App version, web tag, or commit if known. PromptHub will turn this into a version label automatically."
      placeholder: "e.g. 0.5.5, web-v0.5.5, main@abc1234"
    validations:
      required: true

  - type: textarea
    id: current_behavior
    attributes:
      label: "What happened?"
      description: "Describe the actual behavior and visible errors."
      placeholder: "Tell us what broke."
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: "What did you expect?"
      description: "Describe the expected result."
      placeholder: "Tell us what you expected to happen."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to reproduce"
      description: "Provide a minimal, deterministic repro path."
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: "Logs, screenshots, or extra context"
      description: "Paste logs, stack traces, screenshots, or related links if available."
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: "Before submitting"
      options:
        - label: "I searched existing issues and did not find an obvious duplicate."
          required: true
        - label: "I can still reproduce this on the latest available build for my channel."
          required: true
